<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile scaling and iPhone responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProxiShop Mobile | MotionDev Xlab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="mobile-header">
        <div class="logo">🛒 ProxiShop</div>
    </header>

    <div class="container mobile-padding">
        <!-- Location Section -->
        <section class="card location-card">
            <h3><i class="fas fa-map-marker-alt"></i> Store Location</h3>
            <div id="location-status" class="status-box">
                <i class="fas fa-sync-alt"></i> Waiting for location...
            </div>
            
            <div class="manual-location">
                <button id="detect-btn" class="detect-btn">Update Location</button>
                <div class="coord-input">
                    <span>Or enter coordinates:</span>
                    <input type="text" id="manual-coords" placeholder="-25.4530, 28.6484">
                    <button id="set-manual-btn" class="small-btn">Set</button>
                </div>
            </div>

            <div class="store-grid" id="store-grid">
                <!-- Stores cards will display distance here -->
            </div>
        </section>

        <!-- Input Section -->
        <section class="card input-card">
            <h3><i class="fas fa-cart-plus"></i> Add Shopping Items</h3>
            <div class="input-group">
                <input type="text" id="item-input" placeholder="e.g. 10kg Maize Meal">
                <input type="number" id="item-qty" value="1" min="1">
                <button id="add-btn">Add Item</button>
            </div>
            
            <div class="bulk-input" style="margin-top: 15px;">
                <textarea id="bulk-items" placeholder="Or paste multiple items here (one per line)..." rows="3"></textarea>
                <button id="bulk-btn" class="secondary-btn">Import List</button>
            </div>
        </section>

        <!-- Results Section -->
        <section class="card plan-card">
            <h3><i class="fas fa-list-check"></i> Optimal Shopping Plan</h3>
            <div id="plan-summary" class="summary-banner">
                Add items to calculate your best route.
            </div>
            <div id="optimal-details">
                <!-- Optimal breakdown injected here -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
